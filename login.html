<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Findero — Login</title>
<link rel="stylesheet" href="assets/styles.css">

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box {
  background:#fff;
  padding:30px;
  border-radius:10px;
  width:100%;
  max-width:380px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
  text-align:center;
}

.logo {
  height:90px;
  margin-bottom:15px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.7))
          drop-shadow(0 0 6px rgba(0,0,0,0.2));
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.password-box {
  position:relative;
}

.toggle {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

button {
  width:100%;
  padding:12px;
  background:#ff9800;
  border:none;
  border-radius:6px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover { background:#fb8c00; }

.footer {
  margin-top:15px;
  font-size:0.9rem;
}
</style>
</head>

<body>

<div class="box">

  <img src="assets/logo.png" class="logo">

  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email">

  <div class="password-box">
    <input id="password" type="password" placeholder="Password">
    <span id="togglePassword" class="toggle">👁</span>
  </div>

  <button id="loginBtn">Login</button>

  <div class="footer">
    Don't have an account? <a href="signup.html">Sign Up</a>
  </div>

</div>

<script>
// 👁 SHOW / HIDE PASSWORD
const password = document.getElementById("password");
const toggle = document.getElementById("togglePassword");

toggle.addEventListener("click", () => {
  if (password.type === "password") {
    password.type = "text";
    toggle.textContent = "🙈";
  } else {
    password.type = "password";
    toggle.textContent = "👁";
  }
});
</script>

<script type="module" src="scripts/login.js"></script>

</body>
</html>
