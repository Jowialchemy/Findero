<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

.container {
  width:90%;
  max-width:400px;
  margin:60px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.password-box { position:relative; }

.toggle {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.login-btn { background:#1976d2; color:#fff; }
.signup-btn { background:#ff9800; color:#fff; }
</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<input id="email" type="email" placeholder="Email">
<div class="password-box">
  <input id="password" type="password" placeholder="Password">
  <span class="toggle" onclick="togglePass()">👁</span>
</div>

<button type="button" class="login-btn" id="loginBtn">Login</button>
<button type="button" class="signup-btn" onclick="window.location='signup.html'">
  Don't have an account? Sign Up
</button>

<p id="status"></p>

</div>

<!-- ✅ IMPORTANT: LOAD FIREBASE FIRST -->
<script type="module">
import { auth } from './scripts/firebase.js';
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const btn = document.getElementById("loginBtn");
const status = document.getElementById("status");

btn.addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    status.innerText = "Enter email and password";
    status.style.color = "red";
    return;
  }

  status.innerText = "Logging in...";
  status.style.color = "black";

  try {
    await signInWithEmailAndPassword(auth, email, password);

    status.innerText = "Login successful!";
    status.style.color = "green";

    window.location.href = "dashboard.html";

  } catch(err){
    status.innerText = err.message;
    status.style.color = "red";
  }
});

window.togglePass = function(){
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
};
</script>

</body>
</html>
