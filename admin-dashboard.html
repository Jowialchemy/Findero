<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

header {
  background:#333;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container { padding:20px; }

table {
  width:100%;
  background:#fff;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

button {
  padding:6px 10px;
  background:#4caf50;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>Admin Panel</h2>
  <button id="btnLogout">Logout</button>
</header>

<div class="container">

<h3>Verify Found Items</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Location</th>
<th>Secret</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table">
<tr><td colspan="5">Loading...</td></tr>
</tbody>

</table>

</div>

<script type="module">

import { protectAdminPage, initAdminLogout } from './scripts/admin.js';
import { db } from './scripts/firebase.js';
import {
  collection, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

protectAdminPage();
initAdminLogout();

const table = document.getElementById("table");

async function load(){

  try {

    const snap = await getDocs(collection(db,"foundItems"));

    table.innerHTML = "";

    snap.forEach(d => {

      const item = {id:d.id,...d.data()};

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${item.name || ""}</td>
        <td>${item.location || ""}</td>
        <td>${item.secret || "-"}</td>
        <td>${item.status || "pending"}</td>
        <td>
          <button>Verify</button>
        </td>
      `;

      tr.querySelector("button").onclick = async () => {

        await updateDoc(doc(db,"foundItems",item.id),{
          status: "verified"
        });

        alert("Item Verified!");
        load();
      };

      table.appendChild(tr);

    });

    if(table.innerHTML === ""){
      table.innerHTML = "<tr><td colspan='5'>No items found</td></tr>";
    }

  } catch(err){
    console.error(err);
    table.innerHTML = "<tr><td colspan='5'>Error loading data</td></tr>";
  }
}

load();

</script>

</body>
</html>
