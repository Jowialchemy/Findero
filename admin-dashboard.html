<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

header {
  background:#555;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container {
  padding:20px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

th {
  background:#eee;
}

select {
  padding:5px;
}

button {
  padding:6px 10px;
  border:none;
  background:#ff9800;
  color:#fff;
  cursor:pointer;
  border-radius:4px;
}

button:hover {
  background:#fb8c00;
}
</style>
</head>

<body>

<header>
  <h2>Admin Panel</h2>
  <button id="btnLogout">Logout</button>
</header>

<div class="container">

<h3>Manage Items</h3>

<table>
<thead>
<tr>
<th>Type</th>
<th>Name</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table">
<tr><td colspan="4">Loading...</td></tr>
</tbody>

</table>

</div>

<script type="module">

import { protectAdminPage, initAdminLogout } from './scripts/admin.js';
import { db } from './scripts/firebase.js';
import {
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

protectAdminPage();
initAdminLogout();

const table = document.getElementById("table");

async function loadItems(){

  table.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

  try {

    const foundSnap = await getDocs(collection(db,"foundItems"));
    const lostSnap = await getDocs(collection(db,"lostItems"));

    table.innerHTML = "";

    function addRow(item, type){

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${type}</td>
        <td>${item.name || ""}</td>
        <td>
          <select>
            <option value="pending" ${item.status==="pending"?"selected":""}>pending</option>
            <option value="claimed" ${item.status==="claimed"?"selected":""}>claimed</option>
            <option value="verified" ${item.status==="verified"?"selected":""}>verified</option>
          </select>
        </td>
        <td><button>Update</button></td>
      `;

      const select = tr.querySelector("select");
      const btn = tr.querySelector("button");

      btn.onclick = async () => {
        const newStatus = select.value;

        const col = type === "Found" ? "foundItems" : "lostItems";

        await updateDoc(doc(db, col, item.id), {
          status: newStatus
        });

        alert("Status updated successfully!");
      };

      table.appendChild(tr);
    }

    foundSnap.forEach(docu=>{
      addRow({id:docu.id,...docu.data()}, "Found");
    });

    lostSnap.forEach(docu=>{
      addRow({id:docu.id,...docu.data()}, "Lost");
    });

    if(table.innerHTML === ""){
      table.innerHTML = "<tr><td colspan='4'>No items found</td></tr>";
    }

  } catch(err){
    table.innerHTML = "<tr><td colspan='4'>Error loading data</td></tr>";
    console.error(err);
  }
}

loadItems();

</script>

</body>
</html>
