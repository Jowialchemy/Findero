<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body { font-family:Arial; margin:0; background:#f5f5f5; }

header {
  background:#1976d2;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container { padding:20px; }

table {
  width:100%;
  background:#fff;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

button {
  background:#ff9800;
  border:none;
  color:#fff;
  padding:6px;
}

/* MOBILE */
@media(max-width:700px){
  table,thead,tbody,tr,td {
    display:block;
  }

  tr {
    margin-bottom:15px;
    background:#fff;
    padding:10px;
  }

  td {
    display:flex;
    justify-content:space-between;
  }

  th { display:none; }
}
</style>
</head>

<body>

<header>
  <h3>Admin Panel</h3>
  <button id="btnLogout">Logout</button>
</header>

<div class="container">
<table>
<thead>
<tr>
<th>Name</th>
<th>Location</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>
</div>

<script type="module">
import { db } from './scripts/firebase.js';
import { collection,getDocs,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const table = document.getElementById("table");

async function load(){
  const snap = await getDocs(collection(db,"foundItems"));
  table.innerHTML="";

  snap.forEach(d=>{
    const item = d.data();

    const tr = document.createElement("tr");

    tr.innerHTML=`
      <td>${item.name}</td>
      <td>${item.location}</td>
      <td>${item.status}</td>
      <td><button>Verify</button></td>
    `;

    tr.querySelector("button").onclick=async()=>{
      await updateDoc(doc(db,"foundItems",d.id),{status:"verified"});
      load();
    };

    table.appendChild(tr);
  });
}

load();
</script>

</body>
</html>
