<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Findero Admin Login</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5;">

<div style="background:#fff;padding:30px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.2);width:350px;text-align:center;">
  
  <img src="assets/logo.png" style="height:90px;margin-bottom:15px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.7)) drop-shadow(0 0 6px rgba(0,0,0,0.2));">

  <h2>Admin Login</h2>

  <input id="email" type="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">
  <input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

  <button id="loginBtn" style="width:100%;padding:12px;background:#ff9800;color:#fff;border:none;border-radius:5px;font-weight:bold;">
    Login
  </button>

</div>

<script type="module" src="scripts/admin.js"></script>

</body>
</html>
