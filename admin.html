<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Findero Admin Login</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header style="background:#555; color:white; display:flex;align-items:center; padding:12px 24px;">
  <img src="assets/logo.png" alt="Findero Logo" style="height:90px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.7)) drop-shadow(0 0 6px rgba(0,0,0,0.2));">
  <h1 style="margin-left:12px;">Findero Admin Login</h1>
</header>

<main class="container" style="padding:24px; text-align:center;">
  <div class="title">Admin Login</div>
  <form id="adminLoginForm" style="margin-top:16px; display:flex; flex-direction:column; align-items:center; gap:12px;">
    <input id="adminEmail" type="email" placeholder="Email" style="padding:8px;width:250px;">
    <input id="adminPassword" type="password" placeholder="Password" style="padding:8px;width:250px;">
    <button id="adminLoginBtn" class="btn secondary" type="submit">Login</button>
  </form>
</main>

<script type="module">
import { initAdminLogin } from './scripts/admin.js';
initAdminLogin();
</script>
</body>
</html>
