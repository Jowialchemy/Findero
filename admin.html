<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Findero — Admin Dashboard</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  th { background-color: #f4f4f4; }
  img { max-width: 80px; height: auto; border-radius: 4px; }
  .status-btn { cursor: pointer; padding: 4px 8px; border-radius: 4px; border: none; }
  .Pending { background-color: #ff9800; color: white; }
  .Claimed { background-color: #4caf50; color: white; }
  #searchBox { width: 100%; padding: 8px; margin: 12px 0; border-radius: 4px; border: 1px solid #ccc; }
</style>
</head>
<body>
<header>
  <img src="assets/logo.png" alt="Findero Logo" style="height:50px;">
  <div>
    <button id="btnLogout" class="btn ghost">Logout</button>
  </div>
</header>

<main class="container">
  <div class="title">Admin Dashboard</div>
  <div class="subtitle">Manage all reported items</div>

  <!-- Search box -->
  <input type="text" id="searchBox" placeholder="Search by Name, Type, Location, or Status">

  <table id="itemsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Name</th>
        <th>Description</th>
        <th>Location</th>
        <th>Date</th>
        <th>Image</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <!-- Items will be populated here -->
    </tbody>
  </table>
</main>

<div class="footer">© 2025 Findero. All rights reserved.</div>

<script type="module" src="scripts/admin.js"></script>
</body>
</html>
