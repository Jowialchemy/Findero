<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Report Found Item — Findero</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header>
  <img src="assets/logo.png" alt="Findero Logo">
  <div>
    <a class="btn ghost" href="dashboard.html">Dashboard</a>
    <button id="btnLogout" class="btn ghost">Logout</button>
  </div>
</header>

<main class="container">
  <div class="title">Report Found Item</div>
  <div class="subtitle">Submit items you found so owners can claim them</div>

  <form id="foundForm">
    <input type="file" name="image" required>
    <input type="text" name="desc" placeholder="Description" required>
    <button type="button" class="btn secondary" onclick="submitItem('found', 'foundForm')">Submit</button>
  </form>
</main>

<div class="footer">© 2025 Findero. All rights reserved.</div>

<script type="module">
import { initLogoutButton } from './scripts/auth.js';
import { protectPage, submitItem } from './scripts/items.js';

protectPage(true);
initLogoutButton();
</script>
</body>
</html>
