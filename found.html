<script type="module">
import { db, storage } from "./scripts/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const btn = document.getElementById("submitBtn");
const status = document.getElementById("status");
const imageInput = document.getElementById("image");
const preview = document.getElementById("preview");

/* ✅ PREVIEW */
imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

/* ✅ SUBMIT */
btn.addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const location = document.getElementById("location").value.trim();
  const description = document.getElementById("description").value.trim();
  const secret = document.getElementById("secret").value.trim();
  const file = imageInput.files[0];

  if(!name || !location){
    status.innerText = "Fill required fields";
    status.style.color = "red";
    return;
  }

  status.innerText = "Uploading...";

  try {
    let imageURL = "";

    if(file){
      const storageRef = ref(storage, "found-items/" + Date.now() + "_" + file.name);

      const uploadTask = uploadBytesResumable(storageRef, file);

      // 🔥 WAIT FOR UPLOAD TO FINISH PROPERLY
      await new Promise((resolve, reject) => {
        uploadTask.on(
          "state_changed",
          (snapshot) => {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            status.innerText = "Uploading: " + Math.round(progress) + "%";
          },
          (error) => {
            reject(error);
          },
          async () => {
            imageURL = await getDownloadURL(uploadTask.snapshot.ref);
            resolve();
          }
        );
      });
    }

    status.innerText = "Saving data...";

    await addDoc(collection(db,"foundItems"),{
      name,
      location,
      description,
      secret,
      imageURL: imageURL,
      status:"pending",
      createdAt: Date.now()
    });

    status.innerText = "✅ Item submitted successfully!";
    status.style.color = "green";

    // RESET
    document.getElementById("name").value = "";
    document.getElementById("location").value = "";
    document.getElementById("description").value = "";
    document.getElementById("secret").value = "";
    imageInput.value = "";
    preview.style.display = "none";

  } catch(err){
    console.error(err);
    status.innerText = err.message;
    status.style.color = "red";
  }

});
</script>
