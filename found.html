<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Report Found Item</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container {
  width:90%;
  max-width:500px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

h2 {
  text-align:center;
}

input, textarea {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:14px;
  background:#ff9800;
  border:none;
  color:#fff;
  border-radius:6px;
}

#status {
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Report Found Item</h2>

<input id="name" placeholder="Item Name">
<input id="location" placeholder="Where you found it">
<textarea id="description" placeholder="Describe item"></textarea>
<input id="secret" placeholder="Secret Identifier">

<button id="submitBtn">Submit</button>
<p id="status"></p>
</div>

<script type="module">
import { db } from "./scripts/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document.getElementById("submitBtn").onclick = async () => {
  const name = name.value;
  const location = location.value;
  const description = description.value;
  const secret = secret.value;

  if(!name || !location){
    status.innerText = "Fill required fields";
    return;
  }

  await addDoc(collection(db,"foundItems"),{
    name,location,description,secret,
    status:"pending",
    createdAt:Date.now()
  });

  status.innerText = "Submitted!";
};
</script>

</body>
</html>
