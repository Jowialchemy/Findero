<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Found Item</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

.container {
  max-width: 600px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  background: orange;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

#preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  display: none;
}

#status {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Report Found Item</h2>

  <input id="name" placeholder="Item name">
  <input id="location" placeholder="Where found">
  <textarea id="description" placeholder="Description"></textarea>
  <input id="secret" placeholder="Secret detail (for verification)">
  <input type="file" id="image">

  <img id="preview">

  <button id="submitBtn">Submit</button>

  <p id="status"></p>
</div>

<script type="module">
import { db, storage } from "./scripts/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const btn = document.getElementById("submitBtn");
const status = document.getElementById("status");
const imageInput = document.getElementById("image");
const preview = document.getElementById("preview");

/* PREVIEW */
imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

/* SUBMIT */
btn.addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const location = document.getElementById("location").value.trim();
  const description = document.getElementById("description").value.trim();
  const secret = document.getElementById("secret").value.trim();
  const file = imageInput.files[0];

  if(!name || !location){
    status.innerText = "Fill required fields";
    status.style.color = "red";
    return;
  }

  btn.disabled = true;
  status.innerText = "Uploading...";

  try {
    let imageURL = "";

    if(file){
      const storageRef = ref(storage, "found-items/" + Date.now() + "_" + file.name);

      const uploadTask = uploadBytesResumable(storageRef, file);

      await new Promise((resolve, reject) => {
        uploadTask.on(
          "state_changed",
          (snapshot) => {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            status.innerText = "Uploading: " + Math.round(progress) + "%";
          },
          (error) => reject(error),
          async () => {
            imageURL = await getDownloadURL(uploadTask.snapshot.ref);
            resolve();
          }
        );
      });
    }

    status.innerText = "Saving...";

    await addDoc(collection(db,"foundItems"),{
      name,
      location,
      description,
      secret,
      imageURL,
      status:"pending",
      createdAt: Date.now()
    });

    status.innerText = "✅ Item submitted successfully!";
    status.style.color = "green";

    document.getElementById("name").value = "";
    document.getElementById("location").value = "";
    document.getElementById("description").value = "";
    document.getElementById("secret").value = "";
    imageInput.value = "";
    preview.style.display = "none";

  } catch(err){
    console.error(err);
    status.innerText = err.message;
    status.style.color = "red";
  }

  btn.disabled = false;
});
</script>

</body>
</html>
