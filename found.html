<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Found Item</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container {
  width:90%;
  max-width:500px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

h2 { text-align:center; }

input, textarea {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:14px;
  background:#ff9800;
  border:none;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

#preview {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}

#status {
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Report Found Item</h2>

<input id="name" placeholder="Item Name">
<input id="location" placeholder="Location Found">
<textarea id="description" placeholder="Describe the item"></textarea>
<input id="secret" placeholder="Secret Identifier">

<!-- 🔥 IMAGE UPLOAD -->
<input type="file" id="image">

<img id="preview" style="display:none;"/>

<button type="button" id="submitBtn">Submit</button>

<p id="status"></p>

</div>

<script type="module">
import { db } from "./scripts/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const btn = document.getElementById("submitBtn");
const status = document.getElementById("status");
const imageInput = document.getElementById("image");
const preview = document.getElementById("preview");

let imageBase64 = "";

/* 🔥 IMAGE PREVIEW */
imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];

  if(file){
    const reader = new FileReader();

    reader.onload = () => {
      imageBase64 = reader.result;
      preview.src = imageBase64;
      preview.style.display = "block";
    };

    reader.readAsDataURL(file);
  }
});

/* 🔥 SUBMIT FIXED */
btn.addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const location = document.getElementById("location").value.trim();
  const description = document.getElementById("description").value.trim();
  const secret = document.getElementById("secret").value.trim();

  if(!name || !location){
    status.innerText = "Fill required fields";
    status.style.color = "red";
    return;
  }

  status.innerText = "Submitting...";

  try {
    await addDoc(collection(db,"foundItems"),{
      name,
      location,
      description,
      secret,
      image: imageBase64 || "",
      status:"pending",
      createdAt: Date.now()
    });

    status.innerText = "Item submitted successfully!";
    status.style.color = "green";

    // reset form
    document.getElementById("name").value = "";
    document.getElementById("location").value = "";
    document.getElementById("description").value = "";
    document.getElementById("secret").value = "";
    imageInput.value = "";
    preview.style.display = "none";

  } catch(err){
    status.innerText = err.message;
    status.style.color = "red";
  }

});
</script>

</body>
</html>
