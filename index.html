<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Findero — Home</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
/* BODY */
body {
  font-family: Arial, sans-serif;
  background-color: #fefefe;
  margin: 0;
  color: #333;
}

/* HEADER (SOFT BLUE 🔵) */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 24px;
  background-color:#1976d2;
  color:white;
}

header img {
  height:90px;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.7))
          drop-shadow(0 0 6px rgba(0,0,0,0.3));
}

/* MAIN BUTTONS */
.main-buttons {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
  margin-top:25px;
}

.main-buttons a {
  padding:12px 18px;
  background:#ff9800;
  color:white;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
  font-size:14px;
  transition:0.25s;
  box-shadow: 0 4px 10px rgba(255,152,0,0.3);
}

.main-buttons a:hover {
  background:#e68900;
  transform:translateY(-3px);
  box-shadow: 0 6px 18px rgba(255,152,0,0.4);
}

/* TOP BUTTONS */
.btn {
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
  font-size:14px;
}

.btn.ghost {
  color:white;
  border:1px solid white;
}

.btn.secondary {
  background:#ff9800;
  color:white;
}

/* CONTENT */
.container {
  padding:30px;
  text-align:center;
}

.title {
  font-size:26px;
  font-weight:bold;
  color:#0d47a1;
}

.subtitle {
  margin-top:8px;
  color:#555;
}

/* FOOTER (BLUE 🔵) */
.footer {
  text-align:center;
  padding:12px;
  background:#1976d2;
  color:white;
  margin-top:40px;
}
</style>

</head>

<body>

<header>
  <img src="assets/logo.png" alt="Findero Logo">

  <div id="authLinks" style="display:flex;gap:8px;">
    <a class="btn ghost" href="login.html">Login</a>
    <a class="btn secondary" href="signup.html">Sign Up</a>
  </div>
</header>

<main class="container">

  <div class="title">Welcome to Findero</div>
  <div class="subtitle">
    Report lost or found items, search the database, or track by ID.
  </div>

  <div class="main-buttons">
    <a href="found.html">Report Found Item</a>
    <a href="lost.html">Report Lost Item</a>
    <a href="search.html">Search Items</a>
    <a href="track.html">Track Item</a>
  </div>

</main>

<div class="footer">© 2025 Findero. All rights reserved.</div>

<script type="module">
import { auth } from './scripts/firebase.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth, user => {
  const authLinks = document.getElementById('authLinks');

  if(user){
    authLinks.innerHTML = `
      <a class="btn ghost" href="dashboard.html">Dashboard</a>
      <button id="logoutBtn" class="btn ghost">Logout</button>
    `;

    document.getElementById('logoutBtn').onclick = async () => {
      await signOut(auth);
      window.location.reload();
    };
  }
});
</script>

</body>
</html>
