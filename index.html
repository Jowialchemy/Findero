<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Findero — Home</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#fefefe;
  margin:0;
  color:#333;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:#1976d2;
  color:#fff;
  flex-wrap:wrap;
}

header img {
  height:55px;
}

/* AUTH */
#authLinks {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.btn {
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  text-decoration:none;
}

.btn.ghost {
  color:white;
  border:1px solid white;
}

.btn.secondary {
  background:#ff9800;
  color:white;
}

/* CONTENT */
.container {
  padding:20px;
  text-align:center;
}

.title {
  font-size:20px;
  font-weight:bold;
  color:#0d47a1;
}

.subtitle {
  font-size:14px;
  margin-top:5px;
}

/* BUTTON GRID */
.main-buttons {
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-top:20px;
}

.main-buttons a {
  padding:14px;
  background:#ff9800;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* DESKTOP */
@media(min-width:600px){
  .main-buttons {
    grid-template-columns:repeat(2,1fr);
  }

  .title {
    font-size:26px;
  }
}

/* FOOTER */
.footer {
  text-align:center;
  padding:12px;
  background:#1976d2;
  color:white;
  margin-top:40px;
  font-size:13px;
}
</style>
</head>

<body>

<header>
  <img src="assets/logo.png" alt="Findero Logo">

  <div id="authLinks">
    <a class="btn ghost" href="login.html">Login</a>
    <a class="btn secondary" href="signup.html">Sign Up</a>
  </div>
</header>

<main class="container">
  <div class="title">Welcome to Findero</div>
  <div class="subtitle">
    Report lost or found items, search or track easily.
  </div>

  <div class="main-buttons">
    <a href="found.html">Report Found Item</a>
    <a href="lost.html">Report Lost Item</a>
    <a href="search.html">Search Items</a>
    <a href="track.html">Track Item</a>
  </div>
</main>

<div class="footer">© 2025 Findero. All rights reserved.</div>

<script type="module">
import { auth } from './scripts/firebase.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth, user => {
  const authLinks = document.getElementById('authLinks');

  if(user){
    authLinks.innerHTML = `
      <a class="btn ghost" href="dashboard.html">Dashboard</a>
      <button id="logoutBtn" class="btn ghost">Logout</button>
    `;

    document.getElementById('logoutBtn').onclick = async () => {
      await signOut(auth);
      window.location.reload();
    };
  }
});
</script>

</body>
</html>
