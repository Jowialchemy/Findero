<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Findero — Dashboard</title>
<link rel="stylesheet" href="assets/styles.css">
</head>

<body>

<header>
  <img src="assets/logo.png" alt="Findero Logo">
  <button id="btnLogout" class="btn ghost">Logout</button>
</header>

<main class="container">
  <div class="title">Dashboard</div>
  <div class="subtitle">Choose an action</div>

  <div class="results-grid">

    <a href="found.html" class="card action-card">
      <h3>Report Found Item</h3>
      <p>Submit items you found so owners can claim them</p>
    </a>

    <a href="lost.html" class="card action-card">
      <h3>Report Lost Item</h3>
      <p>Tell us what you lost so others can search</p>
    </a>

    <a href="search.html" class="card action-card blue">
      <h3>Search Items</h3>
      <p>Live search across found + lost items</p>
    </a>

    <a href="track.html" class="card action-card blue">
      <h3>Track Item</h3>
      <p>Lookup by tracking ID</p>
    </a>

  </div>
</main>

<div class="footer">© 2025 Findero. All rights reserved.</div>

<script type="module">
import { protectPage } from './scripts/items.js';
import { initLogoutButton } from './scripts/auth.js';

protectPage(true);
initLogoutButton();
</script>

</body>
</html>
