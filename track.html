<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Item</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

.container {
  padding:20px;
  max-width:500px;
  margin:auto;
}

.card {
  background:#fff;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.card img {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Track Item</h2>

<input type="text" id="trackInput" placeholder="Enter Tracking ID" style="width:100%;padding:12px;">
<br><br>

<button onclick="trackItem()" style="width:100%;padding:12px;background:#ff9800;border:none;color:#fff;">
Track
</button>

<div id="result"></div>

</div>

<script type="module">
import { db } from "./scripts/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.trackItem = async function(){
  const id = document.getElementById("trackInput").value.trim();
  const resultDiv = document.getElementById("result");

  if(!id){
    alert("Enter tracking ID");
    return;
  }

  resultDiv.innerHTML = "Searching...";

  let foundItem = null;

  const lostSnap = await getDocs(collection(db,"lostItems"));
  lostSnap.forEach(doc=>{
    const data = doc.data();
    if(data.trackingID === id){
      foundItem = data;
    }
  });

  const foundSnap = await getDocs(collection(db,"foundItems"));
  foundSnap.forEach(doc=>{
    const data = doc.data();
    if(data.trackingID === id){
      foundItem = data;
    }
  });

  if(!foundItem){
    resultDiv.innerHTML = "No item found";
    return;
  }

  resultDiv.innerHTML = `
    <div class="card">
      <strong>${foundItem.item || foundItem.name}</strong><br>
      Location: ${foundItem.location}<br>
      <p>${foundItem.description}</p>
      ${foundItem.imageURL ? `<img src="${foundItem.imageURL}">` : ""}
    </div>
  `;
};
</script>

</body>
</html>
