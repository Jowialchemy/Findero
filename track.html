<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Track Item — Findero</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.track-box {
  max-width: 400px;
  margin: 30px auto;
  text-align:center;
}

.track-box input {
  width:100%;
  padding:12px;
  border-radius:6px;
  border:1px solid #ccc;
}

.result {
  margin-top:20px;
}
</style>

</head>

<body>

<header>
  <img src="assets/logo.png">
</header>

<main class="container">

  <div class="title">Track Item</div>
  <div class="subtitle">Enter your tracking ID to check status</div>

  <div class="track-box">
    <input type="text" id="trackInput" placeholder="Enter Tracking ID">
    <br><br>
    <button class="btn orange" onclick="trackItem()">Track</button>
  </div>

  <div id="result" class="result"></div>

</main>

<div class="footer">© 2025 Findero. All rights reserved.</div>

<script src="scripts/firebase.js"></script>

<script>
function trackItem(){
  const id = document.getElementById("trackInput").value.trim().toUpperCase();
  const resultDiv = document.getElementById("result");

  if(!id){
    alert("Enter tracking ID");
    return;
  }

  resultDiv.innerHTML = "Searching...";

  db.collection("items").get().then(snapshot => {

    let found = null;

    snapshot.forEach(doc => {
      const data = doc.data();
      if(data.trackingID === id){
        found = data;
      }
    });

    if(!found){
      resultDiv.innerHTML = "<p>No item found</p>";
      return;
    }

    resultDiv.innerHTML = `
      <div class="card">
        <strong>${found.name}</strong><br>
        Type: ${found.type}<br>
        Location: ${found.location}<br>
        Status: ${found.status}<br>
        <p>${found.description}</p>
        ${found.image ? `<img src="${found.image}" width="100%">` : ""}
      </div>
    `;
  });
}
</script>

</body>
</html>
