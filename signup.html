<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container {
  width:90%;
  max-width:400px;
  margin:40px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

h2 {
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.password-box {
  position:relative;
}

.toggle {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:14px;
}

/* BUTTONS */
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.signup-btn {
  background:#ff9800;
  color:#fff;
}

.login-btn {
  background:#1976d2;
  color:#fff;
}

#status {
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<!-- 🔥 FULL NAME -->
<input id="name" type="text" placeholder="Full Name">

<!-- 🔥 EMAIL -->
<input id="email" type="email" placeholder="Email">

<!-- 🔥 PHONE -->
<input id="phone" type="tel" placeholder="Phone Number">

<!-- PASSWORD -->
<div class="password-box">
  <input id="password" type="password" placeholder="Password">
  <span class="toggle" onclick="togglePass('password')">👁</span>
</div>

<!-- CONFIRM -->
<div class="password-box">
  <input id="confirmPassword" type="password" placeholder="Confirm Password">
  <span class="toggle" onclick="togglePass('confirmPassword')">👁</span>
</div>

<!-- BUTTON -->
<button type="button" class="signup-btn" id="signupBtn">Sign Up</button>

<button type="button" class="login-btn" onclick="window.location='login.html'">
  Already have an account? Login
</button>

<p id="status"></p>

</div>

<script type="module">
import { auth, db } from './scripts/firebase.js';
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const btn = document.getElementById("signupBtn");
const status = document.getElementById("status");

btn.addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirm = document.getElementById("confirmPassword").value.trim();

  // ✅ VALIDATION
  if(!name || !email || !phone || !password){
    status.innerText = "Please fill all fields";
    status.style.color = "red";
    return;
  }

  if(password.length < 6){
    status.innerText = "Password must be at least 6 characters";
    status.style.color = "red";
    return;
  }

  if(password !== confirm){
    status.innerText = "Passwords do not match";
    status.style.color = "red";
    return;
  }

  status.innerText = "Creating account...";
  status.style.color = "black";

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    // ✅ SAVE USER DATA
    await setDoc(doc(db, "users", userCred.user.uid), {
      name: name,
      email: email,
      phone: phone,
      createdAt: Date.now()
    });

    status.innerText = "Account created successfully!";
    status.style.color = "green";

    // ✅ REDIRECT
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } catch(err){
    status.innerText = err.message;
    status.style.color = "red";
  }

});

/* SHOW PASSWORD */
window.togglePass = function(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
};
</script>

</body>
</html>
