<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign Up — Findero</title>
<link rel="stylesheet" href="assets/styles.css">

<style>
/* Centered layout */
.auth-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 90vh;
}

/* Card */
.auth-card {
  width: 100%;
  max-width: 400px;
  background: white;
  padding: 28px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

/* Logo */
.auth-card img {
  height: 90px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.7))
          drop-shadow(0 0 6px rgba(0,0,0,0.2));
}

/* Title */
.auth-title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 6px;
  color: #0d47a1;
}

.auth-subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

/* Inputs */
.auth-card input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* Button */
.auth-btn {
  width: 100%;
  padding: 12px;
  background: #ff9800;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

.auth-btn:hover {
  background: #e68900;
}

/* Link */
.auth-link {
  margin-top: 14px;
  font-size: 14px;
}

.auth-link a {
  color: #1976d2;
  text-decoration: none;
  font-weight: bold;
}
</style>

</head>

<body>

<header>
  <img src="assets/logo.png" alt="Findero Logo">
</header>

<div class="auth-wrapper">
  <div class="auth-card">

    <img src="assets/logo.png" alt="Logo">

    <div class="auth-title">Create Account</div>
    <div class="auth-subtitle">Join Findero and start tracking items</div>

    <input type="email" id="email" placeholder="Email address">
    <input type="password" id="password" placeholder="Password">

    <button class="auth-btn" id="signupBtn">Sign Up</button>

    <div class="auth-link">
      Already have an account? <a href="login.html">Login</a>
    </div>

  </div>
</div>

<div class="footer">© 2025 Findero. All rights reserved.</div>

<script type="module">
import { signUp } from './scripts/auth.js';

document.getElementById('signupBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if(!email || !password){
    alert("Please fill all fields");
    return;
  }

  try {
    await signUp(email, password);
    alert("Account created successfully!");
    window.location.href = "dashboard.html";
  } catch(err){
    alert(err.message);
  }
});
</script>

</body>
</html>
