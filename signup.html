<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Findero — Sign Up</title>
<link rel="stylesheet" href="assets/styles.css">

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box {
  background:#fff;
  padding:30px;
  border-radius:10px;
  width:100%;
  max-width:400px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
  text-align:center;
}

.logo {
  height:90px;
  margin-bottom:15px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.7))
          drop-shadow(0 0 6px rgba(0,0,0,0.2));
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.password-box {
  position:relative;
}

.toggle {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

button {
  width:100%;
  padding:12px;
  background:#ff9800;
  border:none;
  border-radius:6px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover { background:#fb8c00; }

.footer {
  margin-top:15px;
  font-size:0.9rem;
}
</style>
</head>

<body>

<div class="box">

  <img src="assets/logo.png" class="logo">

  <h2>Create Account</h2>

  <input id="name" type="text" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="phone" type="text" placeholder="Phone Number">

  <div class="password-box">
    <input id="password" type="password" placeholder="Password">
    <span id="togglePassword" class="toggle">👁</span>
  </div>

  <div class="password-box">
    <input id="confirmPassword" type="password" placeholder="Confirm Password">
    <span id="toggleConfirm" class="toggle">👁</span>
  </div>

  <button id="signupBtn">Sign Up</button>

  <div class="footer">
    Already have an account? <a href="login.html">Login</a>
  </div>

</div>

<script>
// 👁 PASSWORD TOGGLE
function toggleField(fieldId, toggleId){
  const field = document.getElementById(fieldId);
  const toggle = document.getElementById(toggleId);

  toggle.addEventListener("click", () => {
    if (field.type === "password") {
      field.type = "text";
      toggle.textContent = "🙈";
    } else {
      field.type = "password";
      toggle.textContent = "👁";
    }
  });
}

toggleField("password", "togglePassword");
toggleField("confirmPassword", "toggleConfirm");
</script>

<script type="module" src="scripts/signup.js"></script>

</body>
</html>
