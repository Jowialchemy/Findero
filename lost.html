<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Lost Item</title>

<style>
body { font-family: Arial; background: #f5f5f5; padding: 20px; }
.container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; }
input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ccc; }
button { width: 100%; padding: 14px; background: #e74c3c; color: white; border: none; border-radius: 8px; }
#preview { width: 100%; display:none; margin-top:10px; border-radius:8px; }
.msg { text-align:center; margin-top:10px; }
</style>
</head>

<body>

<div class="container">
  <h2>Report Lost Item</h2>

  <input id="name" placeholder="Your Name">
  <input id="item" placeholder="Item Lost">
  <input id="location" placeholder="Where lost">
  <textarea id="description"></textarea>
  <input id="contact" placeholder="Contact">
  <input type="file" id="imageFile">

  <img id="preview">

  <button id="submitBtn">Submit</button>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { db, storage } from "./scripts/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const btn = document.getElementById("submitBtn");
const msg = document.getElementById("msg");
const imageInput = document.getElementById("imageFile");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

btn.addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const item = document.getElementById("item").value.trim();
  const location = document.getElementById("location").value.trim();
  const description = document.getElementById("description").value.trim();
  const contact = document.getElementById("contact").value.trim();
  const file = imageInput.files[0];

  if(!name || !item || !location || !description || !contact){
    msg.innerText = "Fill all fields";
    msg.style.color = "red";
    return;
  }

  msg.innerText = "Uploading...";

  try {
    let imageURL = "";

    if(file){
      const storageRef = ref(storage, "items/" + Date.now() + "_" + file.name);
      const uploadTask = uploadBytesResumable(storageRef, file);

      await new Promise((resolve, reject) => {
        uploadTask.on(
          "state_changed",
          (snap) => {
            const p = (snap.bytesTransferred / snap.totalBytes) * 100;
            msg.innerText = "Uploading: " + Math.round(p) + "%";
          },
          reject,
          async () => {
            imageURL = await getDownloadURL(uploadTask.snapshot.ref);
            resolve();
          }
        );
      });
    }

    await addDoc(collection(db,"items"),{
      type: "lost",
      name,
      item,
      location,
      description,
      contact,
      imageUrl: imageURL, // ✅ FIXED
      status:"pending",
      createdAt: Date.now()
    });

    msg.innerText = "✅ Submitted!";
    msg.style.color = "green";

    document.querySelectorAll("input, textarea").forEach(el => el.value = "");
    preview.style.display = "none";

  } catch(err){
    console.error(err);
    msg.innerText = err.message;
    msg.style.color = "red";
  }

});
</script>

</body>
</html>
