<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Lost Item</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  height: 100px;
}

button {
  width: 100%;
  padding: 14px;
  background: #e74c3c;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#preview {
  width: 100%;
  border-radius: 8px;
  margin-top: 10px;
  display: none;
}

.msg {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>Report Lost Item</h2>

  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="item" placeholder="Item Lost (e.g Phone, Bag)">
  <input type="text" id="location" placeholder="Where it was lost">
  <input type="date" id="dateLost">
  <textarea id="description" placeholder="Describe the item"></textarea>
  <input type="text" id="contact" placeholder="Contact Info (Phone/WhatsApp)">

  <!-- IMAGE -->
  <input type="file" id="imageFile" accept="image/*">
  <img id="preview">

  <button id="submitBtn">Submit Report</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { db, storage } from "./scripts/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const btn = document.getElementById("submitBtn");
const msg = document.getElementById("msg");
const imageInput = document.getElementById("imageFile");
const preview = document.getElementById("preview");

/* ✅ IMAGE PREVIEW */
imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

/* ✅ SUBMIT */
btn.addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const item = document.getElementById("item").value.trim();
  const location = document.getElementById("location").value.trim();
  const dateLost = document.getElementById("dateLost").value;
  const description = document.getElementById("description").value.trim();
  const contact = document.getElementById("contact").value.trim();
  const file = imageInput.files[0];

  if(!name || !item || !location || !description || !contact){
    msg.style.color = "red";
    msg.innerText = "Please fill all required fields";
    return;
  }

  msg.innerText = "Uploading...";

  try {
    let imageURL = "";

    if(file){
      const storageRef = ref(storage, "lost-items/" + Date.now() + "_" + file.name);
      const uploadTask = uploadBytesResumable(storageRef, file);

      await new Promise((resolve, reject) => {
        uploadTask.on(
          "state_changed",
          (snapshot) => {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            msg.innerText = "Uploading: " + Math.round(progress) + "%";
          },
          (error) => reject(error),
          async () => {
            imageURL = await getDownloadURL(uploadTask.snapshot.ref);
            resolve();
          }
        );
      });
    }

    msg.innerText = "Saving...";

    await addDoc(collection(db, "lostItems"), {
      name,
      item,
      location,
      dateLost,
      description,
      contact,
      imageURL,
      status: "pending",
      createdAt: Date.now()
    });

    msg.style.color = "green";
    msg.innerText = "✅ Lost item reported successfully!";

    // RESET
    document.querySelectorAll("input, textarea").forEach(el => el.value = "");
    preview.style.display = "none";

  } catch (error) {
    console.error(error);
    msg.style.color = "red";
    msg.innerText = error.message;
  }

});
</script>

</body>
</html>
