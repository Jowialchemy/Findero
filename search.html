<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Search Items — Findero</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

.container { padding:20px; }

.search-box {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.search-box input, .search-box select {
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

.card {
  background:#fff;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Search Items</h2>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search item...">
  <select id="typeFilter">
    <option value="">All</option>
    <option value="lost">Lost</option>
    <option value="found">Found</option>
  </select>
  <input type="text" id="locationFilter" placeholder="Location">
</div>

<div id="results"></div>

</div>

<script type="module">
import { db } from "./scripts/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const resultsDiv = document.getElementById("results");

async function loadItems(){
  resultsDiv.innerHTML = "Loading...";

  const lostSnap = await getDocs(collection(db,"lostItems"));
  const foundSnap = await getDocs(collection(db,"foundItems"));

  let items = [];

  lostSnap.forEach(doc=>{
    items.push({ ...doc.data(), type:"lost" });
  });

  foundSnap.forEach(doc=>{
    items.push({ ...doc.data(), type:"found" });
  });

  renderItems(items);
}

function renderItems(items){
  resultsDiv.innerHTML = "";

  if(items.length === 0){
    resultsDiv.innerHTML = "No items found";
    return;
  }

  items.forEach(item=>{
    resultsDiv.innerHTML += `
      <div class="card">
        <strong>${item.item || item.name || "Item"}</strong><br>
        Type: ${item.type}<br>
        Location: ${item.location || "N/A"}<br>
        <p>${item.description || ""}</p>
        ${item.imageURL ? `<img src="${item.imageURL}">` : ""}
      </div>
    `;
  });
}

loadItems();
</script>

</body>
</html>
