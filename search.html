<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Search Items — Findero</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header>
  <img src="assets/logo.png" alt="Findero Logo">
  <div>
    <a class="btn ghost" href="dashboard.html">Dashboard</a>
    <button id="btnLogout" class="btn ghost">Logout</button>
  </div>
</header>

<main class="container">
  <div class="title">Search Items</div>
  <div class="subtitle">Search across all found and lost items</div>

  <input type="text" id="searchInput" placeholder="Enter keyword..." style="margin-bottom:12px">
  <div id="results" class="results-grid"></div>
</main>

<div class="footer">© 2025 Findero. All rights reserved.</div>

<script type="module">
import { protectPage, db } from './scripts/items.js';
import { initLogoutButton } from './scripts/auth.js';
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

protectPage(true);
initLogoutButton();

const input = document.getElementById('searchInput');
const resultsDiv = document.getElementById('results');

input.addEventListener('input', async () => {
  const keyword = input.value.toLowerCase();
  resultsDiv.innerHTML = "";

  if(!keyword) return;

  // Fetch all items
  const snapshot = await getDocs(collection(db, "items"));
  snapshot.forEach(doc => {
    const data = doc.data();
    if((data.description && data.description.toLowerCase().includes(keyword)) || 
       (data.type && data.type.toLowerCase().includes(keyword))) {

      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <div><strong>Type:</strong> ${data.type}</div>
        <div><strong>Description:</strong> ${data.description}</div>
        ${data.image ? `<img src="${data.image}" style="width:100%;margin-top:6px;border-radius:4px">` : ""}
        <div><strong>Status:</strong> ${data.status}</div>
        <div><strong>Date:</strong> ${new Date(data.date.seconds*1000).toLocaleString()}</div>
      `;
      resultsDiv.appendChild(div);
    }
  });
});
</script>
</body>
</html>
